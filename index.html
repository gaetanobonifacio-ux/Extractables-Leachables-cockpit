<style>
  :root{
    --bg-base:#0a0e16; --bg-elev-1:#11161f; --bg-elev-2:#161c28; --bg-elev-3:#1c2331;
    --border:#2a3245; --border-strong:#3a4356;
    --text-primary:#e8e6e0; --text-secondary:#b4b8c5; --text-muted:#6b7184;
    --accent:#d4a574; --accent-dim:#8a6d4b;
    --font-display:'IBM Plex Serif', Georgia, serif;
    --font-body:'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono:'IBM Plex Mono', 'SF Mono', Menlo, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{background:var(--bg-base); color:var(--text-primary); font-family:var(--font-body); overflow:hidden;}
  .app{display:grid; grid-template-columns:268px 1fr; height:100vh;}

  /* ---------- Sidebar ---------- */
  .sidebar{background:var(--bg-elev-1); border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0;}
  .brand{padding:22px 20px 18px; border-bottom:1px solid var(--border);}
  .brand .kicker{color:var(--accent); font-family:var(--font-mono); font-size:10.5px; letter-spacing:2.5px;}
  .brand h1{font-family:var(--font-display); font-weight:600; font-size:19px; line-height:1.25; margin-top:8px; color:var(--text-primary);}
  .brand .case{color:var(--text-muted); font-size:11.5px; margin-top:6px; font-family:var(--font-mono); letter-spacing:.5px;}

  .nav{padding:14px 12px; overflow-y:auto; flex:1; min-height:0;}
  .nav .sec{color:var(--text-muted); font-family:var(--font-mono); font-size:10px; letter-spacing:2px; padding:6px 8px 10px;}
  .nav-item{width:100%; text-align:left; background:transparent; border:1px solid transparent; border-radius:8px;
    color:var(--text-secondary); font-family:var(--font-body); font-size:13.5px; cursor:pointer;
    display:flex; align-items:center; gap:12px; padding:10px 10px; margin-bottom:4px; transition:background .15s, border-color .15s, color .15s;}
  .nav-item:hover{background:var(--bg-elev-2); color:var(--text-primary);}
  .nav-item:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .nav-item.active{background:var(--bg-elev-3); border-color:var(--border-strong); color:var(--text-primary);}
  .nav-item .bar{width:3px; height:26px; border-radius:2px; background:var(--clr, var(--accent)); flex:0 0 auto;}
  .nav-item .num{font-family:var(--font-mono); font-size:11px; color:var(--text-muted); width:18px; flex:0 0 auto;}
  .nav-item.active .num{color:var(--accent);}
  .nav-item .lbl{line-height:1.2;}

  .side-foot{border-top:1px solid var(--border); padding:14px 18px 16px;}
  .caution{display:flex; align-items:center; gap:8px; color:var(--text-secondary); font-size:11px; line-height:1.4;}
  .caution .dot{width:7px; height:7px; border-radius:50%; background:#f97316; flex:0 0 auto;}
  .side-foot .cprt{color:var(--text-muted); font-size:10.5px; margin-top:10px; line-height:1.5;}
  .side-foot .demo{color:var(--accent-dim); font-size:10px; margin-top:6px; font-family:var(--font-mono);}

  /* ---------- Main ---------- */
  .main{display:flex; flex-direction:column; min-width:0; min-height:0;}
  .topbar{height:58px; flex:0 0 auto; border-bottom:1px solid var(--border); background:var(--bg-base);
    display:flex; align-items:center; justify-content:space-between; padding:0 22px;}
  .crumbs{display:flex; align-items:baseline; gap:12px;}
  .crumbs .step{font-family:var(--font-mono); font-size:12px; color:var(--accent); letter-spacing:1px;}
  .crumbs .title{font-family:var(--font-display); font-size:17px; color:var(--text-primary);}
  .actions{display:flex; align-items:center; gap:14px;}
  .open-raw{color:var(--text-secondary); font-size:12px; text-decoration:none; font-family:var(--font-mono);
    border:1px solid var(--border); border-radius:6px; padding:6px 11px; transition:border-color .15s, color .15s;}
  .open-raw:hover{border-color:var(--accent-dim); color:var(--text-primary);}
  .open-raw[hidden]{display:none;}

  .content{flex:1; min-height:0; position:relative; background:var(--bg-base);}
  .view{position:absolute; inset:0;}
  .view[hidden]{display:none;}

  /* Map / overview */
  .map-stage{width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:22px;}
  .map-stage svg{width:100%; height:100%;}
  .launch-hit{fill:transparent; cursor:pointer; stroke:transparent; stroke-width:2; transition:stroke .15s, fill .15s;}
  .launch-hit:hover{stroke:var(--accent); fill:rgba(212,165,116,0.10);}
  .launch-hit:focus-visible{outline:none; stroke:var(--accent);}

  /* Artifact frame */
  .frame-stage{width:100%; height:100%; padding:0;}
  .frame-stage iframe{width:100%; height:100%; border:0; background:var(--bg-base); display:block;}

  @media (max-width: 920px){
    .app{grid-template-columns:208px 1fr;}
    .brand h1{font-size:16px;}
    .nav-item{font-size:12.5px;}
  }
</style>

  var openRaw = document.getElementById('openRaw');

  // Build sidebar nav from VIEWS
  VIEWS.forEach(function(v){
    var b = document.createElement('button');
    b.className = 'nav-item';
    b.type = 'button';
    b.setAttribute('data-target', v.id);
    b.style.setProperty('--clr', v.color);
    b.innerHTML = '<span class="bar"></span><span class="num">'+v.num+'</span><span class="lbl">'+v.label+'</span>';
    b.addEventListener('click', function(){ go(v.id); });
    nav.appendChild(b);
  });

  function setActiveNav(id){
    var items = nav.querySelectorAll('.nav-item');
    items.forEach(function(it){
      it.classList.toggle('active', it.getAttribute('data-target') === id);
    });
  }

  function showView(id){
    var v = byId[id];
    if(!v){ v = byId['overview']; id = 'overview'; }   // guardrail: unknown id falls back to overview
    setActiveNav(id);
    crumbStep.textContent = v.num;
    crumbTitle.textContent = v.label;
    if(v.file){
      if(frame.getAttribute('src') !== v.file){ frame.setAttribute('src', v.file); }
      openRaw.href = v.file; openRaw.hidden = false;
      viewMap.hidden = true; viewFrame.hidden = false;
    } else {
      frame.removeAttribute('src');
      openRaw.hidden = true; openRaw.removeAttribute('href');
      viewFrame.hidden = true; viewMap.hidden = false;
    }
  }

  function go(id){
    if(!byId[id]) id = 'overview';
    if(('#'+id) !== location.hash){ location.hash = id; }   // hashchange handler does the work
    else { showView(id); }
  }

  // Clickable workflow-map overlays
  viewMap.addEventListener('click', function(e){
    var t = e.target.closest('[data-target]');
    if(t){ go(t.getAttribute('data-target')); }
  });

  // Deep-linking + browser back/forward
  function fromHash(){
    var id = (location.hash || '').replace('#','');
    showView(byId[id] ? id : 'overview');
  }
  window.addEventListener('hashchange', fromHash);
  fromHash();
</script>
</body>
</html>
